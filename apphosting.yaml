# Config do Firebase App Hosting (Cloud Run) para o projeto outdoormidia-ecf88.
# https://firebase.google.com/docs/app-hosting/configure

runConfig:
  minInstances: 0
  maxInstances: 1
  concurrency: 80
  cpu: 1
  memoryMiB: 512

env:
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: "AIzaSyCSKxh2OHAcW3Z60bAoH9ffQtyroNqUxuk"
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: "outdoormidia-ecf88.firebaseapp.com"
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: "outdoormidia-ecf88"
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_USE_FIREBASE_EMULATOR
    value: "false"
    availability:
      - BUILD
      - RUNTIME

  - variable: FIREBASE_PROJECT_ID
    value: "outdoormidia-ecf88"
    availability:
      - RUNTIME

  - variable: FIREBASE_STORAGE_BUCKET
    value: "outdoormidia-ecf88.firebasestorage.app"
    availability:
      - RUNTIME
