name: Deploy Firestore & Storage Rules

on:
  push:
    branches: [main]
  workflow_dispatch: # Permite rodar manualmente com segurança

concurrency:
  group: deploy-rules
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy rules & indexes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Deploy rules & indexes
        run: npx firebase-tools@latest deploy --only firestore:rules,storage:rules,firestore:indexes --project outdoormidia-ecf88 --non-interactive