name: Deploy Firestore & Storage Rules

on:
  push:
    branches: [main]
    paths:
      - firestore.rules
      - storage.rules
      - firestore.indexes.json
  workflow_dispatch:

concurrency:
  group: deploy-rules
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy rules & indexes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Deploy rules & indexes
        run: >-
          npx firebase-tools@latest deploy
          --only firestore:rules,storage:rules,firestore:indexes
          --project outdoormidia-ecf88
          --non-interactive
